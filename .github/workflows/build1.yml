name: Build Blaze

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /EHsc /std:c++17 nky.cpp ^
          /Fe:blaze.exe ^
          /link user32.lib gdi32.lib gdiplus.lib winhttp.lib ole32.lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blaze
          path: blaze.exe
